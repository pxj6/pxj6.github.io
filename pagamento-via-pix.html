<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pagamento via PIX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Pagamento via PIX</h1>
  </header>

  <main>
    <section class="pix-info">
      <h2>Dados para pagamento</h2>
      <p><strong>Chave PIX:</strong> seuemail@dominio.com</p>
      <p><strong>Nome da conta:</strong> João da Silva</p>
      <p><strong>Instituição:</strong> Banco XYZ</p>

      <div class="qr-code">
        <img src="img/qrcode-pix.png" alt="QR Code PIX">
      </div>
    </section>

    <section class="comprovante">
      <h2>Enviar comprovante</h2>
      <p>Após realizar o pagamento, clique no botão abaixo para enviar o comprovante pelo WhatsApp.</p>
      <a href="https://wa.me/5599999999999?text=Olá,%20segue%20o%20comprovante%20do%20pagamento%20PIX." 
         target="_blank" class="btn-whatsapp">
        Enviar comprovante
      </a>
    </section>
  </main>

  <footer>
    © 2026 — Baixa Music
  </footer>

</body>
</html>
