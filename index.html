<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Baixa Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Ícone do site -->
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="theme-color" content="#1DB954">

  <style>
    :root {
      --bg: #121212;
      --card: #181818;
      --text: #ffffff;
      --muted: #b3b3b3;
      --accent: #1DB954;
      --danger: #ff4d4d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      padding: 4rem 1.5rem;
      text-align: center;
      max-width: 900px;
      margin: auto;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    header p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    section {
      max-width: 1100px;
      margin: auto;
      padding: 3rem 1.5rem;
    }

    h2 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.8rem;
      font-weight: 600;
    }

    .steps, .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--card);
      padding: 1.8rem;
      border-radius: 16px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 0.5rem;
    }

    .card p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    .price {
      font-size: 1.4rem;
      font-weight: bold;
      margin: 1rem 0;
      color: var(--accent);
    }

    .hidden {
      display: none;
    }

    .rules {
      background: #101010;
      border-left: 4px solid var(--accent);
      padding: 1.5rem;
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2rem;
      }
    }

    .card-content {
  display: flex;
  align-items: center; /* centraliza verticalmente */
  gap: 1rem; /* espaço entre imagem e texto */
}

.card-img {
  width: 120px;   /* tamanho quadrado */
  height: 120px;
  border-radius: 12px; /* cantos arredondados */
  object-fit: cover;   /* mantém proporção sem distorcer */
}

.card-info {
  flex: 1; /* ocupa o espaço restante */
  text-align: left;
}
  </style>
</head>

<body>

<header>
<section id="services">
  <h2></h2>

  <div class="services">
<div class="card">
  <div class="card-content">
    <img src="imagem.jpg" alt="Capa do clipe" class="card-img">
    <div class="card-info">
      <h3>Flashback Retro Hits 70 80 90</h3>
      <p>Mais de 200 clipes incríveis para curtir na estrada</p>
      <div class="price">R$9,90 (promoção)</div>
      <p>✔ Formato compatível<br>✔ Resolução apropriada</p>
      <button class="btn" onclick="selectService('logo')">Baixar agora</button>
    </div>
  </div>
</div>
</section>
</header>


<section>
  <h2>Regras do serviço</h2>
  <div class="rules">
    • Pagamento via PIX<br>
    • O arquivo será enviado via link, pelo WhatsApp<br>
  </div>
</section>

<footer>
  © 2026 — Baixa Music
</footer>

<script>
  let selectedService = null;

  function scrollToServices() {
    document.getElementById('services').scrollIntoView({ behavior: 'smooth' });
  }

  function selectService(service) {
    selectedService = service;
    document.getElementById('filter').classList.remove('hidden');
    document.getElementById('filter').scrollIntoView({ behavior: 'smooth' });
  }

  function goToBriefing() {
    if (!selectedService) {
      alert("Por favor, selecione um serviço antes de continuar.");
      return;
    }

    localStorage.setItem("servico", selectedService);
    window.location.href = "detalhes.html";
  }
</script>

</body>
</html>
